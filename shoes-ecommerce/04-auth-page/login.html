<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鞋子電商｜登入頁</title>
    <link rel="stylesheet" href="../normalize.css" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./queries.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville&family=Mina:wght@400;700&family=Noto+Sans+TC:wght@100..900&family=Outfit:wght@100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <nav>
          <div class="logo-link">
            <div class="logo">
              <a href="#">
                <img src="../img/logo.svg" alt="URBNSTEP Logo" />
              </a>
            </div>
            <ul class="page-link">
              <li>
                <a href="../02-product-list-page/product-list.html">商品列表</a>
              </li>
              <li>
                <a href="../01-brand-story-page/index.html">品牌故事</a>
              </li>
            </ul>
          </div>

          <a
            href="../04-auth-page/login.html"
            class="btn-wrapper"
            aria-label="會員中心"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 16 16"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
              class="btn-icon"
            >
              <path
                d="M8 8C8.79565 8 9.55871 7.68393 10.1213 7.12132C10.6839 6.55871 11 5.79565 11 5C11 4.20435 10.6839 3.44129 10.1213 2.87868C9.55871 2.31607 8.79565 2 8 2C7.20435 2 6.44129 2.31607 5.87868 2.87868C5.31607 3.44129 5 4.20435 5 5C5 5.79565 5.31607 6.55871 5.87868 7.12132C6.44129 7.68393 7.20435 8 8 8ZM10 5C10 5.53043 9.78929 6.03914 9.41421 6.41421C9.03914 6.78929 8.53043 7 8 7C7.46957 7 6.96086 6.78929 6.58579 6.41421C6.21071 6.03914 6 5.53043 6 5C6 4.46957 6.21071 3.96086 6.58579 3.58579C6.96086 3.21071 7.46957 3 8 3C8.53043 3 9.03914 3.21071 9.41421 3.58579C9.78929 3.96086 10 4.46957 10 5ZM14 13C14 14 13 14 13 14H3C3 14 2 14 2 13C2 12 3 9 8 9C13 9 14 12 14 13ZM13 12.996C12.999 12.75 12.846 12.01 12.168 11.332C11.516 10.68 10.289 10 8 10C5.71 10 4.484 10.68 3.832 11.332C3.154 12.01 3.002 12.75 3 12.996H13Z"
                fill="currentColor"
              />
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <main class="login">
      <div class="container login-layout">
        <!-- 左側 -->
        <div class="brand-card">
          <img
            class="brand-card__img"
            src="../img/login.png"
            alt="灰藍色與米白色休閒鞋，雙色設計，水花濺起照片"
          />
          <img
            class="brand-card__img mobile"
            src="../img/login-sm.png"
            alt="灰藍色與米白色休閒鞋，雙色設計，水花濺起照片"
          />
        </div>

        <!-- 右側 -->
        <section class="auth-card">
          <img
            class="auth-card__bg"
            src="../img/login-bg.png"
            alt=""
            aria-hidden="true"
          />
          <div class="auth-card__content">
            <h2 class="auth-card__title">歡迎！</h2>

            <ul class="auth-tabs">
              <li>
                <a href="./login.html" class="auth-tabs__button active">
                  登入
                </a>
              </li>
              <li>
                <a href="./register.html" class="auth-tabs__button">註冊</a>
              </li>
            </ul>

            <div class="social-login">
              <button type="button" class="social-login__btn">
                <img
                  class="social-login__logo"
                  src="../img/facebook.svg"
                  alt=""
                  aria-hidden="true"
                />
                <span class="social-login__text">Facebook 登入</span>
              </button>

              <button type="button" class="social-login__btn">
                <img
                  class="social-login__logo"
                  src="../img/apple.svg"
                  alt=""
                  aria-hidden="true"
                />
                <span class="social-login__text">Apple 登入</span>
              </button>

              <button type="button" class="social-login__btn">
                <img
                  class="social-login__logo"
                  src="../img/google.svg"
                  alt=""
                  aria-hidden="true"
                />
                <span class="social-login__text">Google 登入</span>
              </button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <nav>
          <div class="logo-link">
            <div class="logo">
              <a href="#">
                <img src="../img/logo.svg" alt="URBNSTEP Logo" />
              </a>
            </div>
            <ul class="page-link">
              <li>
                <a href="../02-product-list-page/product-list.html">商品列表</a>
              </li>
              <li>
                <a href="../01-brand-story-page/index.html">品牌故事</a>
              </li>
            </ul>
          </div>
        </nav>

        <div class="copyright">
          <p>Copyright &copy;2025 URBNSTYLE</p>
          <p>All Rights Reserved.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
